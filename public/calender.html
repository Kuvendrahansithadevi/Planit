<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* Container styling */
        .calendar-card {
            width: 320px;
            background: white;
            border-radius: 40px;
            padding: 25px;
            border: 1px solid #000;
            font-family: 'Segoe UI', sans-serif;
            position: relative;
        }

        /* Header Info */
        .calendar-header {
            margin-bottom: 10px;
        }
        .calendar-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .calendar-subtitle {
            color: #888;
            font-size: 18px;
            display: flex;
            gap: 15px;
        }
        .time-bold { color: #333; font-weight: 500; }

        /* The Grid Layout */
        .days-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        /* Day Base Style */
        .day {
            width: 45px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #999;
            border-radius: 12px; /* Rounded pill shape */
            font-size: 18px;
            color: #666;
        }

        /* Specific Status Colors */
        .completed {
            background-color: #43a886; /* Teal green */
            color: white;
            border: none;
        }
        .incomplete {
            background-color: #000; /* Black */
            color: white;
            border: none;
        }
        .upcoming {
            background-color: #f6ff00; /* Bright yellow */
            color: #333;
            border: none;
            border-radius: 50%; /* Circular for current/upcoming focus */
        }

        /* Legend / Key at bottom */
        .calendar-legend {
            margin-top: 20px;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-left: 20px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
    </style>
</head>
<body>

<div class="calendar-card">
    <div class="calendar-header">
        <div class="calendar-title">Monthly calendar</div>
        <div class="calendar-subtitle">
            <span>jan 30st</span> 
            <span>Time: <span class="time-bold">21:23</span></span>
        </div>
    </div>

    <div class="days-grid">
        <div class="day completed">1</div>
        <div class="day completed">2</div>
        <div class="day">3</div>
        <div class="day">4</div>
        <div class="day">5</div>
        <div class="day">6</div>
        <div class="day">7</div>
        <div class="day completed">8</div>
        <div class="day completed">9</div>
        <div class="day">10</div>
        <div class="day">11</div>
        <div class="day incomplete">12</div>
        <div class="day">13</div>
        <div class="day">14</div>
        <div class="day completed">15</div>
        <div class="day">16</div>
        <div class="day">17</div>
        <div class="day">18</div>
        <div class="day completed">19</div>
        <div class="day completed">20</div>
        <div class="day">21</div>
        <div class="day">22</div>
        <div class="day incomplete">23</div>
        <div class="day">24</div>
        <div class="day">25</div>
        <div class="day">26</div>
        <div class="day completed">27</div>
        <div class="day">28</div>
        <div class="day completed">29</div>
        <div class="day">30</div>
        <div class="day upcoming">31</div>
    </div>

    <div class="calendar-legend">
        <div class="legend-item">
            <div class="dot" style="background: #43a886;"></div> Tasks Completed
        </div>
        <div class="legend-item">
            <div class="dot" style="background: #f6ff00;"></div> Upcoming tasks
        </div>
        <div class="legend-item">
            <div class="dot" style="background: #000;"></div> incomplete Tasks
        </div>
    </div>
</div>

</body>
</html>
